services:
  mongo:
    image: mongo:7.0
    container_name: threat-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: threat_intel

  app:
    build: .
    container_name: threat-intel-app
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/threat_intel
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - JWT_SECRET=super-secret-jwt-key-change-me-in-production-2026
      - FLASK_ENV=development
      - FLASK_DEBUG=True
    volumes:
      - .:/app
    command: gunicorn --bind 0.0.0.0:5000 api:app

volumes:
  mongo_data:
