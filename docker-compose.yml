
services:
  mongo:
    image: mongo:7.0
    container_name: threat-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: threat_intel

  app:
    build: .
    container_name: threat-intel-app
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - .env
    volumes:
      - .:/app
    command: gunicorn --bind 0.0.0.0:5000 api:app

volumes:
  mongo_data:
